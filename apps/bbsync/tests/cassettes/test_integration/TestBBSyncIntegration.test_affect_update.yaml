        root privileges or container escape.\n\nReferences:\n\nhttps://example.com/show_bug.cgi?id=2040599",
        "id": 15874997}, {"text": "Created kernel tracking bugs for this issue:\n\nAffects:
        fedora-all [bug 2056248]", "time": "2022-02-20T13:50:08Z", "id": 15971028,
        "private_groups": [], "creator_id": 443791, "creation_time": "2022-02-20T13:50:08Z",
        "tags": [], "bug_id": 2044578, "attachment_id": null, "creator": "allarkin@redhat.com",
        "count": 8, "is_private": false}, {"creation_time": "2022-02-21T07:32:03Z",
        "private_groups": [], "creator_id": 326232, "id": 15972156, "text": "Hi Pedro\n\nThe
        information is quite scarce here to determine which kernel versions are affected
        by the issue. Can you point to the upstream fix in 5.17-rc1 which fixes the
        issue? I''m interested to correctly track this CVE in another downstream distribution.\n\nMany
        thanks already!\n\nRegards,\nSalvatore", "time": "2022-02-21T07:32:03Z", "creator":
        "carnil@debian.org", "is_private": false, "count": 10, "tags": [], "attachment_id":
        null, "bug_id": 2044578}, {"creation_time": "2022-02-21T13:06:46Z", "id":
