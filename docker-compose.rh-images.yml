version: '3'

services:
    osidb-data:
      image: registry.redhat.io/rhel8/postgresql-13:1
      hostname: osidb-data
      container_name: osidb-data
      environment:
        POSTGRESQL_DATABASE: osidb
        POSTGRESQL_USER: osidb_admin_user
        # sets the password for the PostgreSQL service
        POSTGRESQL_PASSWORD: passw0rd
        # sets the password to log into the service as a user with psql
        PGPASSWORD: passw0rd
        POSTGRESQL_HOST: osidb-data
      volumes:
        - pg-data:/var/lib/pgsql/data/
        - ${PWD}/etc/pg:/pg:z
        - ${PWD}/scripts/setup-osidb-data-rh-image.sh:/opt/app-root/src/scripts/setup-osidb-data.sh:z
      ports:
        - "5432"
      command: ./scripts/setup-osidb-data.sh
      # See "NOTE about healthchecks":
      # healthcheck:
      #   test: ["CMD-SHELL", "pg_isready -d osidb"]
      #   interval: "60s"
      #   timeout: "5s"
      #   retries: 3

    redis:
      container_name: redis
      hostname: redis
      image: registry.redhat.io/rhel8/redis-6:1
      ports:
        - "6379"

volumes:
  pg-data:
